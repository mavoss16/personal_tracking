name: Daily Data Update

# Runs at 07:00 UTC = 2:00 AM CDT (UTC-5). Shifts to 1:00 AM in winter (CST/UTC-6).
on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch: # allows manual runs from the Actions tab

jobs:
  update-data:
    runs-on: ubuntu-latest

    env:
      NOTION_TOKEN_SHINY: ${{ secrets.NOTION_TOKEN_SHINY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'
          use-public-rspm: true

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-${{ runner.os }}-${{ hashFiles('**/DESCRIPTION') }}-v1
          restore-keys: r-${{ runner.os }}-

      - name: Install CRAN packages
        run: |
          install.packages(c("dplyr", "lubridate", "zoo", "tidyr", "stringr", "readr", "remotes"))
        shell: Rscript {0}

      - name: Install notionR from GitHub
        run: remotes::install_github("Eflores89/notionR")
        shell: Rscript {0}

      - name: Fetch podcast data
        run: source("podcasts/podcast_data_actions.R")
        shell: Rscript {0}

      - name: Fetch article data
        run: source("articles/article_data_actions.R")
        shell: Rscript {0}

      - name: Commit and push updated .rds files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add podcasts/podcast_data.rds articles/article_data.rds
          git diff --cached --quiet || git commit -m "Daily Update"
          git push
